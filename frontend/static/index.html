<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tacit — Second Brain</title>
    <link rel="stylesheet" href="/static/styles.css?v=9">
</head>
<body>
    <div class="app-root">

        <!-- Header -->
        <header class="app-header">
            <div class="header-brand">
                <div class="brand-icon"></div>
                <span class="brand-name">Tacit</span>
            </div>

            <div class="url-bar-wrap">
                <span class="url-bar-icon">↓</span>
                <input
                    type="text"
                    id="urlInput"
                    class="url-bar"
                    placeholder="Drop a YouTube, TikTok, Instagram URL or any webpage..."
                    autocomplete="off"
                    spellcheck="false"
                />
                <button id="ingestBtn" class="ingest-btn">Add to Canvas</button>
            </div>

            <div class="header-actions">
                <button id="toggleChatBtn" class="icon-btn" title="Toggle Chat">💬</button>
                <button id="toggleCategoryBtn" class="icon-btn" title="Categories">Tags</button>
                <button id="resetViewBtn" class="icon-btn" title="Reset View">⊙</button>
            </div>
        </header>

        <!-- Main Body -->
        <div class="app-body">

            <!-- Chat Panel (collapsible + resizable) -->
            <aside id="chatPanel" class="chat-panel">

                <!-- Header A: chat mode -->
                <div class="chat-header" id="chatModeHeader">
                    <span class="chat-title">Ask Tacit</span>
                    <div class="chat-header-actions">
                        <button id="peopleBtn" class="chat-hdr-btn">People</button>
                        <button id="historyBtn" class="chat-hdr-btn">History</button>
                        <button id="newChatBtn" class="chat-hdr-btn chat-hdr-btn--primary">+ New</button>
                    </div>
                </div>

                <!-- Header B: history mode -->
                <div class="chat-header chat-header--history" id="historyModeHeader">
                    <button id="backBtn" class="chat-hdr-btn chat-hdr-btn--back">← Back</button>
                    <span class="chat-title">Conversations</span>
                    <button id="newChatFromHistoryBtn" class="chat-hdr-btn chat-hdr-btn--primary">+ New</button>
                </div>

                <!-- Header C: people mode -->
                <div class="chat-header chat-header--people" id="peopleModeHeader">
                    <button id="backFromPeopleBtn" class="chat-hdr-btn chat-hdr-btn--back">← Back</button>
                    <span class="chat-title">People</span>
                </div>

                <!-- View A: chat -->
                <div class="chat-view">
                    <div id="messages" class="messages"></div>
                    <div class="chat-input-area">
                        <textarea
                            id="messageInput"
                            placeholder="Ask about anything in your canvas..."
                            rows="2"
                        ></textarea>
                        <button id="sendBtn" class="send-btn">↑</button>
                    </div>
                </div>

                <!-- View B: history -->
                <div class="history-view">
                    <div id="historyList" class="history-list"></div>
                </div>

                <!-- View C: people -->
                <div class="people-view">
                    <div id="peopleList" class="people-list"></div>
                </div>

            </aside>

            <!-- Chat panel resize handle -->
            <div class="chat-resize-handle" id="chatResizeHandle"></div>

            <!-- Canvas Area -->
            <main id="canvasViewport" class="canvas-viewport">
                <div id="canvasSurface" class="canvas-surface">
                    <svg id="edgesLayer" class="edges-layer"></svg>
                    <!-- Cards injected here by JS -->
                </div>

                <!-- Empty state -->
                <div id="emptyState" class="empty-state">
                    <div class="empty-icon">🧠</div>
                    <h2>Your second brain is empty</h2>
                    <p>Paste any URL in the bar above to start capturing content.</p>
                    <div class="empty-examples">
                        <span>YouTube</span>
                        <span>TikTok</span>
                        <span>Instagram</span>
                        <span>Articles</span>
                        <span>Any webpage</span>
                    </div>
                </div>
            </main>

            <!-- Node Detail Panel (slides in from right) -->
            <div id="nodeDetailPanel" class="node-detail-panel">
                <div class="detail-header">
                    <button class="detail-close" id="closeDetailBtn">✕</button>
                    <span id="detailType" class="detail-type-badge"></span>
                </div>
                <div id="detailContent" class="detail-content"></div>
            </div>

        </div>
    </div>

    <!-- Category Sidebar (right-side overlay, outside app-body to avoid overflow clipping) -->
    <aside id="categorySidebar" class="category-sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title">Categories</span>
            <button id="autoArrangeBtn" class="sidebar-btn">Arrange</button>
        </div>
        <div id="categoryList" class="category-list"></div>
        <button id="showAllBtn" class="show-all-btn">Show All</button>
    </aside>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <!-- Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <script src="/static/app.js?v=17"></script>
</body>
</html>
