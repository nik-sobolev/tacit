<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Tacit — Second Brain</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tacit">
    <meta name="theme-color" content="#0f0f1a">
    <meta name="description" content="Your AI second brain. Capture YouTube, articles, tweets, and any webpage. Ask questions. Find connections.">
    <meta property="og:title" content="Tacit — Your AI Second Brain">
    <meta property="og:description" content="Capture YouTube, articles, tweets, and any webpage. Ask questions. Find connections.">
    <meta property="og:image" content="https://www.trytacit.app/static/og-image.png">
    <meta property="og:url" content="https://www.trytacit.app">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Tacit">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Tacit — Your AI Second Brain">
    <meta name="twitter:description" content="Capture YouTube, articles, tweets, and any webpage. Ask questions. Find connections.">
    <meta name="twitter:image" content="https://www.trytacit.app/static/og-image.png">
    <link rel="stylesheet" href="/static/styles.css?v=12">
    <script>window.CLERK_PUBLISHABLE_KEY = "pk_live_Y2xlcmsudHJ5dGFjaXQuYXBwJA";</script>
    <script async crossorigin="anonymous" data-clerk-publishable-key="pk_live_Y2xlcmsudHJ5dGFjaXQuYXBwJA" src="https://clerk.trytacit.app/npm/@clerk/clerk-js@5/dist/clerk.browser.js" type="text/javascript"></script>
</head>
<body>
    <div class="app-root">

        <!-- Header -->
        <header class="app-header">
            <div class="header-brand">
                <img src="/static/tacit-logo.png" class="brand-icon" alt="Tacit">
                <span class="brand-name">TACIT</span>
            </div>

            <div class="url-bar-wrap">
                <span class="url-bar-icon">↓</span>
                <input
                    type="text"
                    id="urlInput"
                    class="url-bar"
                    placeholder="Drop a YouTube, TikTok, Instagram URL or any webpage..."
                    autocomplete="off"
                    spellcheck="false"
                />
                <button id="ingestBtn" class="ingest-btn">Add to Canvas</button>
            </div>

            <div class="header-actions">
                <button id="bulkAddBtn" class="icon-btn" title="Add multiple URLs">📋</button>
                <button id="searchToggleBtn" class="icon-btn" title="Search cards">⌕</button>
                <button id="toggleChatBtn" class="icon-btn" title="Toggle Chat">💬</button>
                <button id="toggleCategoryBtn" class="icon-btn" title="Categories">Tags</button>
                <button id="resetViewBtn" class="icon-btn" title="Reset View">⊙</button>
                <div id="usageMeter" class="usage-meter" title="Monthly token usage" style="display:none">
                    <span id="usageText">—</span>
                </div>
            </div>
        </header>

        <!-- Search bar (toggled by ⌕ button) -->
        <div class="header-search-bar" id="headerSearchBar">
            <input type="search" id="canvasSearchInput" placeholder="Search by title, tag, category…" autocomplete="off" spellcheck="false" />
            <button class="search-clear-btn" id="searchClearBtn">✕</button>
        </div>

        <!-- Main Body -->
        <div class="app-body">

            <!-- Chat Panel (collapsible + resizable) -->
            <aside id="chatPanel" class="chat-panel">

                <!-- Header A: chat mode -->
                <div class="chat-header" id="chatModeHeader">
                    <span class="chat-title">Ask Tacit</span>
                    <div class="chat-header-actions">
                        <button id="peopleBtn" class="chat-hdr-btn">People</button>
                        <button id="notesBtn" class="chat-hdr-btn">Notes</button>
                        <button id="historyBtn" class="chat-hdr-btn">History</button>
                        <button id="newChatBtn" class="chat-hdr-btn chat-hdr-btn--primary">+ New</button>
                    </div>
                </div>

                <!-- Header B: history mode -->
                <div class="chat-header chat-header--history" id="historyModeHeader">
                    <button id="backBtn" class="chat-hdr-btn chat-hdr-btn--back">← Back</button>
                    <span class="chat-title">Conversations</span>
                    <button id="newChatFromHistoryBtn" class="chat-hdr-btn chat-hdr-btn--primary">+ New</button>
                </div>

                <!-- Header C: people mode -->
                <div class="chat-header chat-header--people" id="peopleModeHeader">
                    <button id="backFromPeopleBtn" class="chat-hdr-btn chat-hdr-btn--back">← Back</button>
                    <span class="chat-title">People</span>
                </div>

                <!-- Header D: notes mode -->
                <div class="chat-header chat-header--notes" id="notesModeHeader">
                    <button id="backFromNotesBtn" class="chat-hdr-btn chat-hdr-btn--back">← Back</button>
                    <span class="chat-title">Notes</span>
                </div>

                <!-- View A: chat -->
                <div class="chat-view">
                    <div id="messages" class="messages"></div>
                    <div class="chat-input-area">
                        <textarea
                            id="messageInput"
                            placeholder="Ask about anything in your canvas..."
                            rows="2"
                        ></textarea>
                        <button id="sendBtn" class="send-btn">↑</button>
                    </div>
                </div>

                <!-- View B: history -->
                <div class="history-view">
                    <div id="historyList" class="history-list"></div>
                </div>

                <!-- View C: people -->
                <div class="people-view">
                    <div id="peopleList" class="people-list"></div>
                </div>

                <!-- View D: notes -->
                <div class="notes-view">
                    <div id="notesList" class="notes-list"></div>
                </div>

            </aside>

            <!-- Chat panel resize handle -->
            <div class="chat-resize-handle" id="chatResizeHandle"></div>

            <!-- Canvas Area -->
            <main id="canvasViewport" class="canvas-viewport">
                <div id="canvasSurface" class="canvas-surface">
                    <svg id="edgesLayer" class="edges-layer"></svg>
                    <!-- Cards injected here by JS -->
                </div>

                <!-- Empty state -->
                <div id="emptyState" class="empty-state">
                    <div class="empty-icon">🧠</div>
                    <h2>Your second brain</h2>
                    <p>Capture, organize, and connect everything.</p>
                    <div class="empty-actions">
                        <button id="startTourBtn" class="empty-action-btn primary">✨ Take a Tour</button>
                        <button id="skipTourBtn" class="empty-action-btn" onclick="document.getElementById('emptyState').style.display='none'">Skip</button>
                    </div>
                    <div class="empty-examples" style="margin-top:24px">
                        <span>YouTube</span>
                        <span>TikTok</span>
                        <span>Instagram</span>
                        <span>Articles</span>
                        <span>Any webpage</span>
                    </div>
                </div>
            </main>

            <!-- Node Detail Panel (slides in from right) -->
            <div id="nodeDetailPanel" class="node-detail-panel">
                <div class="detail-header">
                    <button class="detail-close" id="closeDetailBtn">✕</button>
                    <span id="detailType" class="detail-type-badge"></span>
                </div>
                <div id="detailContent" class="detail-content"></div>
            </div>

        </div>
    </div>

    <!-- Category Sidebar (right-side overlay, outside app-body to avoid overflow clipping) -->
    <aside id="categorySidebar" class="category-sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title">Categories</span>
            <button id="autoArrangeBtn" class="sidebar-btn">Arrange</button>
        </div>
        <div id="categoryList" class="category-list"></div>
        <button id="showAllBtn" class="show-all-btn">Show All</button>
    </aside>

    <!-- Onboarding Tour Modal -->
    <div id="tourModal" class="tour-modal" style="display:none">
        <div class="tour-overlay"></div>
        <div class="tour-panel">
            <div class="tour-header">
                <h3 id="tourTitle">Welcome to Tacit</h3>
                <button class="tour-close">✕</button>
            </div>
            <div class="tour-body">
                <p id="tourText"></p>
            </div>
            <div class="tour-footer">
                <button class="tour-btn-prev">← Back</button>
                <div class="tour-progress"><span id="tourStep"></span></div>
                <button class="tour-btn-next">Next →</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <!-- Mobile bottom tab bar -->
    <nav id="mobileTabBar" class="mobile-tab-bar">
        <button class="mobile-tab active" data-tab="canvas" onclick="mobileTab('canvas')">
            <span class="mobile-tab-icon">⊞</span>
            <span class="mobile-tab-label">Canvas</span>
        </button>
        <button class="mobile-tab" data-tab="add" onclick="mobileShowAdd()">
            <span class="mobile-tab-icon" style="font-size:22px;line-height:1">+</span>
            <span class="mobile-tab-label">Add</span>
        </button>
        <button class="mobile-tab" data-tab="chat" onclick="mobileTab('chat')">
            <span class="mobile-tab-icon">💬</span>
            <span class="mobile-tab-label">Chat</span>
        </button>
        <button class="mobile-tab" data-tab="profile" id="mobileProfileTab" onclick="mobileOpenProfile()">
            <span class="mobile-tab-icon" id="mobileProfileIcon">👤</span>
            <span class="mobile-tab-label">Me</span>
        </button>
    </nav>

    <!-- Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <script src="/static/app.js?v=38"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js').catch(() => {});
        }
    </script>
</body>
</html>
