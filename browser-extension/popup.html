<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    width: 260px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #1a1a1a;
    color: #e6e6e6;
    padding: 14px;
    margin: 0;
  }
  h1 {
    font-size: 14px;
    font-weight: 600;
    margin: 0 0 10px;
  }
  button {
    width: 100%;
    padding: 9px;
    border: none;
    border-radius: 6px;
    background: #c26c33;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  button:disabled {
    background: #4a4a4a;
    cursor: not-allowed;
  }
  button.secondary {
    background: none;
    color: #9a9a9a;
    font-weight: 400;
    padding: 4px;
    font-size: 12px;
    text-decoration: underline;
  }
  input {
    width: 100%;
    box-sizing: border-box;
    padding: 7px;
    border-radius: 6px;
    border: 1px solid #3a3a3a;
    background: #262626;
    color: #e6e6e6;
    font-size: 12px;
    margin-bottom: 8px;
  }
  #status {
    margin-top: 10px;
    font-size: 12px;
    color: #9a9a9a;
    min-height: 14px;
  }
  #status.error { color: #d97757; }
  #status.success { color: #7fb069; }
  #settings { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid #333; }
  #settings.open { display: block; }
  .hint { font-size: 11px; color: #7a7a7a; margin-bottom: 8px; line-height: 1.4; }
</style>
</head>
<body>
  <h1>Save to Tacit</h1>
  <button id="saveBtn">Save this page</button>
  <div id="status"></div>
  <button class="secondary" id="settingsToggle">Settings</button>
  <div id="settings">
    <div class="hint">Paste your quick-add token (Tacit → profile menu → Browser Extension).</div>
    <input id="tokenInput" type="text" placeholder="Token">
    <button id="saveTokenBtn">Save token</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
